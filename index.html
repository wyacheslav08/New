<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Cabinet Controller</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="title">🎸 Guitar Cabinet</span>
                <span class="version" id="version">v1.0</span>
            </h1>
        </header>
        
        <!-- Статус подключения -->
        <div class="status-card" id="statusCard">
            <div class="status-led" id="statusLed"></div>
            <div class="status-text" id="statusText">Ожидание подключения...</div>
            <button class="connect-btn" id="connectBtn">🔌 Подключиться</button>
        </div>

        <!-- Динамические секции -->
        <div id="sensors-section" class="section"></div>
        <div id="controls-section" class="section"></div>
        <div id="settings-section" class="section"></div>
        
        <!-- Панель отладки (скрыта по умолчанию) -->
        <div class="debug-panel" id="debugPanel" style="display: none;">
            <div class="debug-header">
                <span>📋 Лог подключения</span>
                <button class="debug-toggle" id="debugToggle">▼</button>
            </div>
            <div class="debug-content" id="debugLog"></div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="js/ble-config.js"></script>
    <script src="js/settings-parser.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/ble-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
